<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crypto Dashboard</title>

<style>
:root{
    --bg:#131722;
    --panel:#1e222d;
    --border:#2a2e39;
    --text:#d1d4dc;
    --green:#26a69a;
    --red:#ef5350;
    --yellow:#f0b90b;
    --muted:#787b86;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:min(1200px,95%);
}

.clock{
    font-size:clamp(60px,10vw,120px);
    font-weight:700;
    text-align:center;
    margin-bottom:10px;
}

.date{
    text-align:center;
    color:var(--muted);
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:24px;
}

.label{
    color:var(--muted);
    font-size:14px;
}

.value{
    font-size:40px;
    margin-top:12px;
    font-weight:700;
}

.change{
    margin-top:10px;
    font-size:18px;
    font-weight:600;
}

.green{
    color:var(--green);
}

.red{
    color:var(--red);
}

.yellow{
    color:var(--yellow);
}

.footer{
    text-align:center;
    margin-top:25px;
    color:var(--muted);
    font-size:13px;
}
</style>

<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

</head>

<body>

<div class="container">

```
<div id="clock" class="clock">00:00:00</div>

<div id="date" class="date"></div>

<div class="grid">

    <div class="card">
        <div class="label">BTC</div>
        <div id="btcPrice" class="value">$0</div>
        <div id="btcChange" class="change">--</div>
    </div>

    <div class="card">
        <div class="label">ETH</div>
        <div id="ethPrice" class="value">$0</div>
        <div id="ethChange" class="change">--</div>
    </div>

    <div class="card">
        <div class="label">Fear & Greed</div>
        <div id="fearValue" class="value yellow">--</div>
        <div id="fearText" class="change">Loading...</div>
    </div>

</div>

<div class="chart-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;">
    <div class="card" style="padding: 16px;">
        <div class="label" style="margin-bottom: 10px;">BTC 走势 (24H)</div>
        <div id="btcChart" style="height: 300px; width: 100%;"></div>
    </div>
    <div class="card" style="padding: 16px;">
        <div class="label" style="margin-bottom: 10px;">ETH 走势 (24H)</div>
        <div id="ethChart" style="height: 300px; width: 100%;"></div>
    </div>
</div>

<div class="footer">
    <div id="updateTime">Waiting...</div>
</div>
```

</div>

<script>

function updateClock(){

    const now = new Date();

    document.getElementById("clock").innerText =
        now.toLocaleTimeString("zh-CN",{hour12:false});

    document.getElementById("date").innerText =
        now.toLocaleDateString(
            "zh-CN",
            {
                year:"numeric",
                month:"long",
                day:"numeric",
                weekday:"long"
            }
        );
}

function setChange(el,value){

    const num = Number(value);

    el.innerText =
        `${num >= 0 ? "▲" : "▼"} ${num.toFixed(2)}%`;

    el.className =
        "change " + (num >= 0 ? "green" : "red");
}

async function loadCrypto(){

    const res = await fetch(
        "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true"
    );

    const data = await res.json();

    document.getElementById("btcPrice").innerText =
        "$" + data.bitcoin.usd.toLocaleString();

    document.getElementById("ethPrice").innerText =
        "$" + data.ethereum.usd.toLocaleString();

    setChange(
        document.getElementById("btcChange"),
        data.bitcoin.usd_24h_change
    );

    setChange(
        document.getElementById("ethChange"),
        data.ethereum.usd_24h_change
    );
}

async function loadFearGreed(){

    try{

        const res = await fetch(
            "https://api.alternative.me/fng/?limit=1"
        );

        const json = await res.json();

        const item = json.data[0];

        document.getElementById("fearValue")
            .innerText = item.value;

        document.getElementById("fearText")
            .innerText = item.value_classification;

    }catch(e){
        console.error(e);
    }
}

async function refresh(){

    try{

        await Promise.all([
            loadCrypto(),
            loadFearGreed(),
            loadChartData()
        ]);

        document.getElementById("updateTime")
            .innerText =
            "Last Update: " +
            new Date().toLocaleTimeString();

    }catch(e){

        document.getElementById("updateTime")
            .innerText =
            "API Connection Failed";
    }
}

let btcChartObj, ethChartObj;
let btcSeries, ethSeries;

function initCharts() {
    const chartOptions = {
        layout: {
            background: { type: 'solid', color: 'transparent' },
            textColor: '#d1d4dc',
        },
        grid: {
            vertLines: { color: '#2a2e39' },
            horzLines: { color: '#2a2e39' },
        },
        timeScale: {
            timeVisible: true,
            secondsVisible: false,
        },
        rightPriceScale: {
            borderVisible: false,
        }
    };

    btcChartObj = LightweightCharts.createChart(document.getElementById('btcChart'), chartOptions);
    btcSeries = btcChartObj.addAreaSeries({
        lineColor: '#f0b90b',
        topColor: 'rgba(240, 185, 11, 0.4)',
        bottomColor: 'rgba(240, 185, 11, 0.0)',
        lineWidth: 2,
    });

    ethChartObj = LightweightCharts.createChart(document.getElementById('ethChart'), chartOptions);
    ethSeries = ethChartObj.addAreaSeries({
        lineColor: '#627eea',
        topColor: 'rgba(98, 126, 234, 0.4)',
        bottomColor: 'rgba(98, 126, 234, 0.0)',
        lineWidth: 2,
    });
    
    window.addEventListener('resize', () => {
        if(btcChartObj) btcChartObj.resize(document.getElementById('btcChart').clientWidth, 300);
        if(ethChartObj) ethChartObj.resize(document.getElementById('ethChart').clientWidth, 300);
    });
}

async function loadChartData() {
    try {
        const [btcRes, ethRes] = await Promise.all([
            fetch("https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=1"),
            fetch("https://api.coingecko.com/api/v3/coins/ethereum/market_chart?vs_currency=usd&days=1")
        ]);
        
        const btcData = await btcRes.json();
        const ethData = await ethRes.json();

        const formatData = (data) => {
            let lastTime = 0;
            return data.prices.map(item => {
                let t = Math.floor(item[0] / 1000);
                if (t <= lastTime) t = lastTime + 1; // force ascending for lightweight-charts
                lastTime = t;
                return { time: t, value: item[1] };
            });
        };

        if (btcSeries && ethSeries) {
            btcSeries.setData(formatData(btcData));
            ethSeries.setData(formatData(ethData));
            btcChartObj.timeScale().fitContent();
            ethChartObj.timeScale().fitContent();
        }
    } catch(e) {
        console.error("Failed to load chart data:", e);
    }
}

initCharts();
updateClock();
refresh();

setInterval(updateClock,1000);
setInterval(refresh,30000);

</script>

</body>
</html>
